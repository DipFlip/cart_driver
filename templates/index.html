<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart Driver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">ROBSTRIDE CONTROL</p>
          <h1>Cart Driver</h1>
        </div>
        <div id="connectionBadge" class="badge offline">OFFLINE</div>
      </header>

      <section class="panel telemetry">
        <div>
          <span>Drive</span>
          <strong id="driveReadout">0°/s</strong>
        </div>
        <div>
          <span>Steering</span>
          <strong id="steeringReadout">0.0°</strong>
        </div>
        <div>
          <span>Safety</span>
          <strong id="safetyReadout">DISARMED</strong>
        </div>
      </section>

      <section class="workspace">
        <div class="panel movement-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">MOVEMENT</p>
              <h2>WASD or hold buttons</h2>
            </div>
            <button id="centerButton" class="text-button">Center steering</button>
          </div>

          <div class="controls" aria-label="Directional controls">
            <button class="control up" data-drive="1" aria-label="Forward">
              <span>W</span><b>↑</b>
            </button>
            <button class="control left" data-steer="-1" aria-label="Left">
              <span>A</span><b>←</b>
            </button>
            <div class="steering-gauge">
              <div class="gauge-track">
                <div id="gaugeNeedle" class="gauge-needle"></div>
              </div>
              <small>−60°</small><small>0°</small><small>+60°</small>
            </div>
            <button class="control right" data-steer="1" aria-label="Right">
              <span>D</span><b>→</b>
            </button>
            <button class="control down" data-drive="-1" aria-label="Reverse">
              <span>S</span><b>↓</b>
            </button>
          </div>
        </div>

        <aside class="panel settings-panel">
          <p class="eyebrow">DRIVE SPEED</p>
          <div class="speed-value"><span id="speedValue">100</span><small>°/s</small></div>
          <input id="speedSlider" type="range" min="0" max="100" value="100" step="5">
          <div class="range-labels"><span>0</span><span>100</span></div>

          <div class="actions">
            <button id="connectButton" class="secondary">Connect</button>
            <button id="armButton" class="primary" disabled>Arm motors</button>
            <button id="stopButton" class="stop">STOP / DISARM</button>
          </div>
          <p id="message" class="message">Connect to the USB adapter to begin.</p>
        </aside>
      </section>

      <footer>
        Drive stops automatically on key release, browser disconnect, or control timeout.
      </footer>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
